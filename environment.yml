# Reproducibility spec for sissopp_env (already installed on this server).
# Note: the `sissopp` Python module itself comes from the SISSO++ build,
# NOT from conda. See https://sissopp_developers.gitlab.io/sissopp/ for
# the build procedure.
name: sissopp_env
channels:
  - conda-forge
dependencies:
  - python=3.9
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - seaborn
  - toml
  - matplotlib
  - jupyter
  - openpyxl
  - pyyaml
  - pre-commit
  - ruff
